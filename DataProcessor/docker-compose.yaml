services:
  zookeeper:
    image: zookeeper:3.7
    container_name: zookeeper
    environment:
      ZOO_MY_ID: 1
      ZOO_PORT: 2181
      ZOO_SERVERS: server.1=zookeeper:2888:3888
    ports:
      - "2181:2181"
    volumes:
      - ./zookeeper_data:/data
      - ./zookeeper_conf:/conf  
    networks:
      - safer_gambling_net

  kafka:
    image: wurstmeister/kafka:2.13-2.8.1
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_CREATE_TOPICS: "test:1:1"  # optional: create initial topics
    ports:
      - "9092:9092"
    networks:
      - safer_gambling_net
    # proper wait-for-zookeeper loop
    command: >
      sh -c "
      echo 'Waiting for Zookeeper...';
      while ! nc -z zookeeper 2181; do sleep 1; done;
      echo 'Zookeeper is up, starting Kafka';
      start-kafka.sh
      "

  fastapi:
    build: .
    container_name: fastapi_risk_service
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ../Model:/app/Model
    command: >
      sh -c "
      echo 'Waiting for Kafka...';
      while ! nc -z kafka 9092; do sleep 1; done;
      echo 'Kafka is up, starting FastAPI';
      uvicorn app:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - safer_gambling_net

  kafkaui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafkaui
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - safer_gambling_net

networks:
  safer_gambling_net:
    driver: bridge